[build]
  command = "next build"
  publish = ".next"

# Skip auto-deploys triggered by pushes to main.
# Deploy production manually with: npm run deploy:prod
[context.production]
  ignore = "exit 0"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
